kind = "video"
previewPath = "/"
title = "Rooftop Rain"
version = "1.0.0"
id = "artifacts/rooftop-rain"
router = "path"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 23370

[services.development]
run = "pnpm --filter @workspace/rooftop-rain run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/rooftop-rain", "run", "build" ]
serve = "static"
publicDir = "artifacts/rooftop-rain/dist/public"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "23370"
BASE_PATH = "/"
